<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrashLead AI — Nationwide Accident Report Finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e17; --surface: #111827; --surface2: #1f2937;
  --border: #374151; --text: #f9fafb; --muted: #9ca3af;
  --accent: #3b82f6; --accent-hover: #2563eb;
  --red: #ef4444; --orange: #f59e0b; --green: #22c55e; --yellow: #eab308;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
.header h1 { font-size: 18px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-stats { display: flex; gap: 20px; font-size: 13px; color: var(--muted); }
.header-stats .stat-value { color: var(--text); font-weight: 600; }

/* Layout */
.app { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 49px); }

/* Sidebar */
.sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
.sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px; }
.search-box { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 16px; }
.search-box:focus { outline: none; border-color: var(--accent); }
.filter-group { margin-bottom: 16px; }
.filter-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.filter-group select, .filter-group input[type="number"] {
  width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px;
}
.filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--accent); }
.source-toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.source-toggle { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.source-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }
.btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
.loading { display: none; text-align: center; padding: 20px; color: var(--muted); }
.loading.visible { display: block; }
.loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Main area */
.main { display: flex; flex-direction: column; overflow: hidden; }

/* Tabs */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Map */
#map-container { height: 45%; min-height: 250px; }
#map { height: 100%; width: 100%; }

/* Table */
.table-container { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { position: sticky; top: 0; z-index: 10; }
thead th { background: var(--surface); padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--muted); border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; }
thead th:hover { color: var(--text); }
thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 8px 12px; white-space: nowrap; }
.severity-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.severity-fatal { background: rgba(239,68,68,0.15); color: var(--red); }
.severity-serious { background: rgba(245,158,11,0.15); color: var(--orange); }
.severity-minor { background: rgba(234,179,8,0.15); color: var(--yellow); }
.severity-none { background: rgba(156,163,175,0.1); color: var(--muted); }
.severity-unknown { background: rgba(156,163,175,0.1); color: var(--muted); }

/* Detail panel */
.detail-panel { display: none; position: fixed; right: 0; top: 49px; width: 400px; height: calc(100vh - 49px); background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 20px; z-index: 500; box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
.detail-panel.open { display: block; }
.detail-panel h3 { font-size: 16px; margin-bottom: 16px; }
.detail-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.detail-row .label { color: var(--muted); }
.detail-row .value { font-weight: 500; text-align: right; max-width: 60%; }

/* Responsive */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  #map-container { height: 200px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🚨 <span>CrashLead</span> AI</h1>
  <div class="header-stats">
    <div>Crashes loaded: <span class="stat-value" id="total-count">0</span></div>
    <div>With injuries: <span class="stat-value" id="injury-count">0</span></div>
    <div>Sources: <span class="stat-value" id="source-count">0</span></div>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Search & Filter</h2>
    <input type="text" class="search-box" id="search" placeholder="Search city, state, type...">

    <div class="filter-group">
      <label>Severity</label>
      <select id="severity-filter">
        <option value="">All severities</option>
        <option value="fatal">Fatal</option>
        <option value="serious">Serious Injury</option>
        <option value="minor">Minor Injury</option>
        <option value="none">No Injury / PDO</option>
      </select>
    </div>

    <div class="filter-group">
      <label>State</label>
      <select id="state-filter">
        <option value="">All states</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Days Back</label>
      <input type="number" id="days-back" value="30" min="1" max="365">
    </div>

    <h2 style="margin-top:16px">Data Sources</h2>
    <div class="source-toggles" id="source-toggles">
      <span class="source-toggle active" data-source="austin">Austin TX</span>
      <span class="source-toggle active" data-source="nyc">NYC</span>
      <span class="source-toggle active" data-source="nhtsa">NHTSA Fatal</span>
      <span class="source-toggle active" data-source="chicago">Chicago</span>
    </div>

    <button class="btn btn-primary" id="fetch-btn" onclick="fetchAllData()">🔍 Fetch Crashes</button>
    <button class="btn btn-secondary" onclick="exportCSV()">📥 Export CSV</button>

    <div class="loading" id="loading">
      <span class="spinner"></span> Fetching crash data...
    </div>

    <div id="source-status" style="margin-top:16px; font-size:12px; color:var(--muted)"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="map-container"><div id="map"></div></div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('date')">Date <span class="sort-arrow">▼</span></th>
            <th onclick="sortTable('severity')">Severity</th>
            <th onclick="sortTable('type')">Type</th>
            <th onclick="sortTable('city')">City</th>
            <th onclick="sortTable('state')">State</th>
            <th onclick="sortTable('injuries')">Injuries</th>
            <th onclick="sortTable('fatalities')">Fatal</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="crash-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <h3 id="detail-title">Crash Details</h3>
  <div id="detail-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let allCrashes = [];
let filteredCrashes = [];
let sortField = 'date';
let sortDir = -1;
let map, markerGroup;

// ── Map Setup ──────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map').setView([39.8, -98.5], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, attribution: '© CartoDB'
  }).addTo(map);
  markerGroup = L.layerGroup().addTo(map);
}

function updateMap() {
  markerGroup.clearLayers();
  const crashes = filteredCrashes.slice(0, 500); // limit for performance
  crashes.forEach(c => {
    if (!c.lat || !c.lon) return;
    const color = c.severity === 'fatal' ? '#ef4444' : c.severity === 'serious' ? '#f59e0b' : c.severity === 'minor' ? '#eab308' : '#6b7280';
    const marker = L.circleMarker([c.lat, c.lon], {
      radius: c.severity === 'fatal' ? 7 : 5, fillColor: color, color: color,
      weight: 1, fillOpacity: 0.7
    });
    marker.bindPopup(`<b>${c.type || 'Crash'}</b><br>${c.city || ''}, ${c.state}<br>${c.date}<br>Injuries: ${c.injuries || 0} | Fatal: ${c.fatalities || 0}`);
    marker.on('click', () => showDetail(c));
    markerGroup.addLayer(marker);
  });
}

// ── Data Sources ───────────────────────────────────────────────────────────

// Austin TX (Socrata)
async function fetchAustin(daysBack) {
  const start = new Date(Date.now() - daysBack * 86400000).toISOString().split('T')[0];
  const url = `https://data.austintexas.gov/resource/y2wy-tber.json?$where=crash_date>'${start}'&$limit=1000&$order=crash_date DESC`;
  const resp = await fetch(url);
  const data = await resp.json();
  return data.map(r => ({
    date: (r.crash_date || '').split('T')[0],
    type: r.crash_sev_id === '4' ? 'Fatal Crash' : r.collsn_desc || r.crash_sev_desc || 'Traffic Crash',
    severity: classifySeverity(r.crash_sev_id === '4' ? 'fatal' : r.crash_sev_desc || ''),
    city: 'Austin', state: 'TX',
    injuries: parseInt(r.tot_injry_cnt) || 0,
    fatalities: parseInt(r.death_cnt) || 0,
    lat: parseFloat(r.latitude) || null,
    lon: parseFloat(r.longitude) || null,
    source: 'Austin TX',
    raw: r
  }));
}

// NYC Open Data (Socrata)
async function fetchNYC(daysBack) {
  const start = new Date(Date.now() - daysBack * 86400000).toISOString().split('T')[0];
  const url = `https://data.cityofnewyork.us/resource/h9gi-nx95.json?$where=crash_date>'${start}'&$limit=1000&$order=crash_date DESC`;
  const resp = await fetch(url);
  const data = await resp.json();
  return data.map(r => ({
    date: (r.crash_date || '').split('T')[0],
    type: [r.contributing_factor_vehicle_1, r.vehicle_type_code1].filter(Boolean).join(' — ') || 'Motor Vehicle Crash',
    severity: classifySeverity(
      (parseInt(r.number_of_persons_killed) || 0) > 0 ? 'fatal' :
      (parseInt(r.number_of_persons_injured) || 0) > 0 ? 'injury' : 'none'
    ),
    city: r.borough || 'New York', state: 'NY',
    injuries: parseInt(r.number_of_persons_injured) || 0,
    fatalities: parseInt(r.number_of_persons_killed) || 0,
    lat: parseFloat(r.latitude) || null,
    lon: parseFloat(r.longitude) || null,
    address: [r.on_street_name, r.cross_street_name].filter(Boolean).join(' & '),
    source: 'NYC OpenData',
    raw: r
  }));
}

// Chicago (Socrata)
async function fetchChicago(daysBack) {
  const start = new Date(Date.now() - daysBack * 86400000).toISOString().split('T')[0];
  const url = `https://data.cityofchicago.org/resource/85ca-t3if.json?$where=crash_date>'${start}'&$limit=1000&$order=crash_date DESC`;
  const resp = await fetch(url);
  const data = await resp.json();
  return data.map(r => ({
    date: (r.crash_date || '').split('T')[0],
    type: r.first_crash_type || r.crash_type || 'Traffic Crash',
    severity: classifySeverity(
      (r.injuries_fatal || 0) > 0 ? 'fatal' :
      (r.injuries_incapacitating || 0) > 0 ? 'serious' :
      (r.injuries_total || 0) > 0 ? 'injury' : 'none'
    ),
    city: 'Chicago', state: 'IL',
    injuries: parseInt(r.injuries_total) || 0,
    fatalities: parseInt(r.injuries_fatal) || 0,
    lat: parseFloat(r.latitude) || null,
    lon: parseFloat(r.longitude) || null,
    address: r.street_name || '',
    source: 'Chicago',
    damage: r.damage,
    raw: r
  }));
}

// NHTSA FARS (fatal only, lags ~1 year)
async function fetchNHTSA() {
  const year = new Date().getFullYear() - 1;
  const crashes = [];
  const states = [6,12,17,18,36,48]; // CA,FL,IL,IN,NY,TX
  const stateNames = {6:'CA',12:'FL',17:'IL',18:'IN',36:'NY',48:'TX'};
  for (const st of states) {
    try {
      const url = `https://crashviewer.nhtsa.dot.gov/CrashAPI/crashes/GetCaseList?states=${st}&fromYear=${year}&toYear=${year}&format=json`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.Results && data.Results[0]) {
        const results = Array.isArray(data.Results[0]) ? data.Results[0] : [];
        results.slice(0, 100).forEach(r => {
          crashes.push({
            date: `${year}`, type: 'Fatal Crash',
            severity: 'fatal', city: r.CITYNAME || '', state: stateNames[st] || '',
            injuries: parseInt(r.TOTALINJURIES) || 0, fatalities: parseInt(r.FATALS) || 1,
            lat: parseFloat(r.LATITUDEDD) || null, lon: parseFloat(r.LONGITUD) || null,
            source: 'NHTSA FARS', raw: r
          });
        });
      }
    } catch(e) { /* skip state */ }
  }
  return crashes;
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function classifySeverity(text) {
  const t = String(text).toLowerCase();
  if (t.includes('fatal') || t.includes('death') || t === '4') return 'fatal';
  if (t.includes('serious') || t.includes('incapacitat') || t.includes('severe')) return 'serious';
  if (t.includes('injur') || t.includes('minor') || t.includes('possible') || t === 'injury') return 'minor';
  if (t.includes('none') || t.includes('no injury') || t.includes('pdo') || t === 'none') return 'none';
  return 'unknown';
}

function severityBadge(sev) {
  const labels = { fatal: 'Fatal', serious: 'Serious', minor: 'Injury', none: 'No Injury', unknown: 'Unknown' };
  return `<span class="severity-badge severity-${sev}">${labels[sev] || sev}</span>`;
}

// ── Fetch All ──────────────────────────────────────────────────────────────
async function fetchAllData() {
  const btn = document.getElementById('fetch-btn');
  const loading = document.getElementById('loading');
  const statusEl = document.getElementById('source-status');
  btn.disabled = true;
  loading.classList.add('visible');
  statusEl.innerHTML = '';

  const daysBack = parseInt(document.getElementById('days-back').value) || 30;
  const activeSources = [...document.querySelectorAll('.source-toggle.active')].map(el => el.dataset.source);

  allCrashes = [];
  const results = {};

  const fetchers = [];
  if (activeSources.includes('austin')) fetchers.push(fetchAustin(daysBack).then(d => { results.austin = d; allCrashes.push(...d); }));
  if (activeSources.includes('nyc')) fetchers.push(fetchNYC(daysBack).then(d => { results.nyc = d; allCrashes.push(...d); }));
  if (activeSources.includes('chicago')) fetchers.push(fetchChicago(daysBack).then(d => { results.chicago = d; allCrashes.push(...d); }));
  if (activeSources.includes('nhtsa')) fetchers.push(fetchNHTSA().then(d => { results.nhtsa = d; allCrashes.push(...d); }));

  await Promise.allSettled(fetchers);

  // Update status
  let statusHTML = '';
  for (const [src, data] of Object.entries(results)) {
    const icon = data.length > 0 ? '✅' : '❌';
    statusHTML += `${icon} ${src}: <b>${data.length}</b> records<br>`;
  }
  statusEl.innerHTML = statusHTML;

  // Populate state filter
  const states = [...new Set(allCrashes.map(c => c.state).filter(Boolean))].sort();
  const stateSelect = document.getElementById('state-filter');
  stateSelect.innerHTML = '<option value="">All states</option>' + states.map(s => `<option value="${s}">${s}</option>`).join('');

  applyFilters();
  btn.disabled = false;
  loading.classList.remove('visible');
}

// ── Filter & Render ────────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const severity = document.getElementById('severity-filter').value;
  const state = document.getElementById('state-filter').value;

  filteredCrashes = allCrashes.filter(c => {
    if (severity && c.severity !== severity) return false;
    if (state && c.state !== state) return false;
    if (search) {
      const haystack = [c.type, c.city, c.state, c.source, c.address, c.date].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Sort
  filteredCrashes.sort((a, b) => {
    let av = a[sortField] || '', bv = b[sortField] || '';
    if (sortField === 'injuries' || sortField === 'fatalities') { av = parseInt(av) || 0; bv = parseInt(bv) || 0; }
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return 0;
  });

  renderTable();
  updateMap();
  updateStats();
}

function renderTable() {
  const tbody = document.getElementById('crash-table');
  tbody.innerHTML = filteredCrashes.slice(0, 500).map((c, i) => `
    <tr onclick="showDetail(allCrashes[${allCrashes.indexOf(c)}])">
      <td>${c.date}</td>
      <td>${severityBadge(c.severity)}</td>
      <td>${(c.type || '').substring(0, 40)}</td>
      <td>${c.city || ''}</td>
      <td>${c.state || ''}</td>
      <td>${c.injuries || 0}</td>
      <td style="color:${c.fatalities > 0 ? 'var(--red)' : 'inherit'}">${c.fatalities || 0}</td>
      <td style="color:var(--muted)">${c.source}</td>
    </tr>
  `).join('');
}

function updateStats() {
  document.getElementById('total-count').textContent = filteredCrashes.length.toLocaleString();
  document.getElementById('injury-count').textContent = filteredCrashes.filter(c => c.injuries > 0 || c.severity !== 'none').length.toLocaleString();
  document.getElementById('source-count').textContent = [...new Set(filteredCrashes.map(c => c.source))].length;
}

// ── Sort ────────────────────────────────────────────────────────────────────
function sortTable(field) {
  if (sortField === field) { sortDir *= -1; } else { sortField = field; sortDir = -1; }
  applyFilters();
}

// ── Detail Panel ────────────────────────────────────────────────────────────
function showDetail(crash) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-title').textContent = crash.type || 'Crash Report';

  const fields = [
    ['Date', crash.date],
    ['Severity', crash.severity],
    ['City', crash.city],
    ['State', crash.state],
    ['Address', crash.address],
    ['Injuries', crash.injuries],
    ['Fatalities', crash.fatalities],
    ['Source', crash.source],
    ['Latitude', crash.lat],
    ['Longitude', crash.lon],
  ];

  // Add all raw fields
  if (crash.raw) {
    for (const [k, v] of Object.entries(crash.raw)) {
      if (v && !['latitude','longitude'].includes(k.toLowerCase())) {
        fields.push([k.replace(/_/g, ' '), v]);
      }
    }
  }

  document.getElementById('detail-body').innerHTML = fields
    .filter(([, v]) => v !== null && v !== undefined && v !== '')
    .map(([label, value]) => `<div class="detail-row"><span class="label">${label}</span><span class="value">${value}</span></div>`)
    .join('');

  panel.classList.add('open');
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }

// ── Export CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  if (!filteredCrashes.length) return alert('No data to export.');
  const headers = ['date','severity','type','city','state','injuries','fatalities','lat','lon','address','source'];
  const rows = filteredCrashes.map(c => headers.map(h => `"${(c[h] || '').toString().replace(/"/g, '""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `crashlead_export_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ── Source Toggles ──────────────────────────────────────────────────────────
document.querySelectorAll('.source-toggle').forEach(el => {
  el.addEventListener('click', () => el.classList.toggle('active'));
});

// ── Live filter on type ─────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('severity-filter').addEventListener('change', applyFilters);
document.getElementById('state-filter').addEventListener('change', applyFilters);

// ── Init ────────────────────────────────────────────────────────────────────
initMap();
fetchAllData();
</script>
</body>
</html>
